<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFTC Cotton On-Call Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:#222}
header{background:linear-gradient(135deg,#1a3a5c,#2e86c1);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{font-size:1.15rem;font-weight:700}
header p{font-size:.75rem;opacity:.8;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
#badge{font-size:.7rem;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);white-space:nowrap}
#badge.ok{background:rgba(39,174,96,.3);border-color:#27ae60}
#badge.err{background:rgba(231,76,60,.3);border-color:#e74c3c}
.btn-print{font-size:.72rem;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;cursor:pointer;white-space:nowrap}
.btn-print:hover{background:rgba(255,255,255,.3)}
.page{max-width:1800px;margin:0 auto;padding:14px}
.cw{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:16px}
.cw h2{font-size:.95rem;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.cw-meta{font-size:.75rem;color:#777;margin-bottom:10px}
.cw-wrap{overflow-x:auto}
.cw-tbl{width:100%;border-collapse:collapse;font-size:.8rem;min-width:640px}
.cw-tbl th{background:#1a3a5c;color:#fff;padding:6px 10px;text-align:right;white-space:nowrap;font-size:.72rem}
.cw-tbl th:first-child{text-align:left}
.cw-tbl td{padding:5px 10px;border-bottom:1px solid #f0f0f0;text-align:right;font-variant-numeric:tabular-nums}
.cw-tbl td:first-child{text-align:left;font-weight:600;color:#1a3a5c}
.cw-tbl tr.total td{font-weight:700;background:#eef5fb;border-top:2px solid #2e86c1}
.cw-tbl .pos{color:#1a7a1a}.cw-tbl .neg{color:#c0392b}
.sec{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#1a3a5c;padding:8px 0 8px 10px;margin-top:4px;border-left:4px solid #2e86c1;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
@media(max-width:1100px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:650px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ct{font-size:.8rem;font-weight:700;color:#1a3a5c;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #eef2f7}
.cr{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.cl{font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.tog{font-size:.58rem;color:#2e86c1;text-decoration:underline;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:2px}
.chip{padding:2px 7px;border-radius:12px;font-size:.63rem;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#555;user-select:none;white-space:nowrap;transition:all .1s}
.chip:hover{border-color:#2e86c1}
.chip.on{background:#2e86c1;color:#fff;border-color:#2e86c1;font-weight:600}
.cb{position:relative;height:255px}
#loading{position:fixed;inset:0;background:rgba(238,242,247,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px}
#loading h2{font-size:1rem;color:#1a3a5c}
.spin{width:38px;height:38px;border:4px solid #dde;border-top-color:#2e86c1;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#err{display:none;background:#fdf0f0;border:1px solid #e74c3c;border-radius:8px;padding:12px 16px;color:#c0392b;margin-bottom:14px;font-size:.82rem;white-space:pre-wrap}

/* ── Print / PDF styles ────────────────────────────────────── */
@media print {
  @page { size: A4 landscape; margin: 8mm 8mm 8mm 8mm; }
  body { background: #fff; font-size: 9pt; }
  #loading, .btn-print, .cr, #err { display: none !important; }
  header { background: #1a3a5c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 6px 12px; box-shadow: none; }
  header h1 { font-size: 10pt; }
  header p  { font-size: 7pt; }
  .page { max-width: 100%; padding: 4px; }
  .cw { box-shadow: none; border: 1px solid #ddd; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
  .cw h2 { font-size: 9pt; }
  .cw-meta { font-size: 7pt; }
  .cw-tbl { font-size: 7pt; }
  .cw-tbl th { font-size: 6.5pt; padding: 3px 5px; }
  .cw-tbl td { padding: 2px 5px; }
  .sec { font-size: 7pt; padding: 4px 0 4px 6px; margin-top: 2px; margin-bottom: 6px; }
  /* Page 1: table + old crop (first 3 charts) */
  /* Page break before All Crop section */
  .page-break-before { page-break-before: always; }
  .grid { gap: 6px; margin-bottom: 8px; }
  .card { box-shadow: none; border: 1px solid #ddd; padding: 6px; border-radius: 3px; }
  .ct { font-size: 7pt; margin-bottom: 4px; padding-bottom: 3px; }
  .cb { height: 130px; }
  .cw-tbl th { background:#1a3a5c !important; color:#fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><h2>Loading Cotton On-Call Data</h2><p id="lmsg" style="font-size:.82rem;color:#555">Fetching CSV...</p></div>
<header>
  <div><h1>CFTC Cotton On-Call Dashboard</h1><p>Unfixed call cotton positions · New York Cotton futures · ICE Futures U.S.</p></div>
  <div class="hdr-right">
    <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    <div id="badge">Loading...</div>
  </div>
</header>
<div class="page">
  <div id="err"></div>
  <div class="cw">
    <h2>Current Week Report</h2>
    <div class="cw-meta" id="cw-meta"></div>
    <div class="cw-wrap"><table class="cw-tbl">
      <thead><tr>
        <th style="text-align:left">Futures Based On</th>
        <th>Sales</th><th>Chg</th>
        <th>Purchases</th><th>Chg</th>
        <th>At Close</th><th>Chg</th>
      </tr></thead>
      <tbody id="cw-body"></tbody>
    </table></div>
  </div>

  <div class="sec">Old Crop</div>
  <div class="grid" id="g-old"></div>

  <!-- page break before All Crop for print -->
  <div class="page-break-before">
    <div class="sec">All Crop</div>
    <div class="grid" id="g-all"></div>
    <div class="sec">New Crop (All minus Old)</div>
    <div class="grid" id="g-new"></div>
  </div>
</div>

<script>
var ALL_DATA=[], DATA={}, ALL_YEARS=[], WL=[];
var CM=[3,5,7,10,12];
var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var PAL=['#1a6b3c','#c0392b','#2e86c1','#8e44ad','#d35400','#16a085','#f39c12','#1a3a5c','#27ae60','#e74c3c','#7f8c8d','#2980b9','#8e44ad','#c0392b','#27ae60'];
var TITLES=['Purchases','Sales','Imbalance (Sales minus Purchases)'];
var GRIDS=['g-old','g-all','g-new'];
var IS_NET=[false,false,true];
var ST=[], CH={};
for(var ii=0;ii<9;ii++) ST.push({years:[],months:CM.slice()});

function yCol(y){
  var idx=ALL_YEARS.indexOf(String(y));
  return PAL[idx%PAL.length];
}

function parseCSV(txt){
  txt=txt.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines=txt.trim().split('\n');
  if(lines.length<2) return [];
  var hdrs=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var rdIdx=-1;
  for(var i=0;i<hdrs.length;i++){if(hdrs[i]==='Report Date'){rdIdx=i;break;}}
  var rows=[];
  for(var li=1;li<lines.length;li++){
    var line=lines[li].trim(); if(!line) continue;
    var v=[],cur='',q=false;
    for(var ci=0;ci<line.length;ci++){
      var c=line[ci];
      if(c==='"'){q=!q;continue;}
      if(c===','&&!q){v.push(cur);cur='';continue;}
      cur+=c;
    }
    v.push(cur);
    var o={};
    for(var hi=0;hi<hdrs.length;hi++) o[hdrs[hi]]=(v[hi]||'').trim();
    if(rdIdx>=0&&(v[rdIdx]||'').indexOf('/')>=0) rows.push(o);
  }
  return rows;
}

function buildData(rows){
  DATA={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var yr=r['Report Year']||'';
    if(!yr&&r['Report Date']&&r['Report Date'].indexOf('/')>=0)
      yr=r['Report Date'].split('/')[2];
    yr=yr.trim();
    var wk=Math.round(parseFloat(r['Week #']));
    var on=r['Old/New']||'';
    var mon=parseFloat(r['Month'])||0;
    var p=parseInt(r['Unfixed Call Purchases'])||0;
    var s=parseInt(r['Unfixed Call Sales'])||0;
    if(!yr||!wk||on==='total') continue;
    if(!DATA[yr]) DATA[yr]={};
    if(!DATA[yr][wk]) DATA[yr][wk]={};
    if(!DATA[yr][wk][mon]) DATA[yr][wk][mon]={oP:0,oS:0,aP:0,aS:0};
    DATA[yr][wk][mon].aP+=p; DATA[yr][wk][mon].aS+=s;
    if(on==='old'){DATA[yr][wk][mon].oP+=p; DATA[yr][wk][mon].oS+=s;}
  }
}

function getAgg(yr,wk,months,field){
  if(!DATA[yr]||!DATA[yr][wk]) return null;
  var slot=DATA[yr][wk],tot=0,any=false;
  for(var i=0;i<months.length;i++){
    if(slot[months[i]]!==undefined){tot+=slot[months[i]][field];any=true;}
  }
  return any?tot:null;
}

function getVal(ci,yr,wk,months){
  var crop=ci<3?'old':ci<6?'all':'new';
  var type=ci%3;
  if(crop==='old'){
    var p=getAgg(yr,wk,months,'oP'),s=getAgg(yr,wk,months,'oS');
    if(p===null&&s===null) return null;
    if(type===0) return p||0; if(type===1) return s||0;
    return (s||0)-(p||0);
  }
  if(crop==='all'){
    var p=getAgg(yr,wk,months,'aP'),s=getAgg(yr,wk,months,'aS');
    if(p===null&&s===null) return null;
    if(type===0) return p||0; if(type===1) return s||0;
    return (s||0)-(p||0);
  }
  var ap=getAgg(yr,wk,months,'aP'),as_=getAgg(yr,wk,months,'aS');
  var op=getAgg(yr,wk,months,'oP'),os=getAgg(yr,wk,months,'oS');
  if(ap===null&&as_===null) return null;
  var np=(ap||0)-(op||0),ns=(as_||0)-(os||0);
  if(type===0) return np; if(type===1) return ns;
  return ns-np;
}

function getMaxMinDS(ci){
  var s=ST[ci];
  // last 20 years
  var years20=ALL_YEARS.slice(-20);
  var maxVals=[],minVals=[];
  for(var wi=0;wi<WL.length;wi++){
    var wk=wi+1,vals=[];
    for(var yi=0;yi<years20.length;yi++){
      var v=getVal(ci,years20[yi],wk,s.months);
      if(v!==null) vals.push(v);
    }
    if(vals.length){
      maxVals.push(Math.max.apply(null,vals));
      minVals.push(Math.min.apply(null,vals));
    }else{maxVals.push(null);minVals.push(null);}
  }
  return [
    {label:'20yr Max',data:maxVals,borderColor:'rgba(130,130,130,0.55)',
     borderDash:[5,4],borderWidth:1.2,tension:0.35,pointRadius:0,fill:false,spanGaps:false,order:99},
    {label:'20yr Min',data:minVals,borderColor:'rgba(180,180,180,0.55)',
     borderDash:[5,4],borderWidth:1.2,tension:0.35,pointRadius:0,fill:false,spanGaps:false,order:99}
  ];
}

function buildDS(ci){
  var s=ST[ci],ds=[];
  var yrs=s.years.slice().sort();
  for(var yi=0;yi<yrs.length;yi++){
    var yr=yrs[yi],vals=[];
    for(var wi=0;wi<WL.length;wi++) vals.push(getVal(ci,yr,wi+1,s.months));
    ds.push({label:String(yr),data:vals,borderColor:yCol(yr),backgroundColor:yCol(yr)+'18',
      borderWidth:1.8,tension:0.35,pointRadius:0,pointHoverRadius:4,fill:false,spanGaps:false,order:1});
  }
  // add max/min dotted lines
  var mm=getMaxMinDS(ci);
  ds.push(mm[0]); ds.push(mm[1]);
  return ds;
}

function drawChart(ci){
  var ds=buildDS(ci),net=IS_NET[ci%3];
  if(CH[ci]){CH[ci].data.datasets=ds;CH[ci].update('none');return;}
  var ctx=document.getElementById('ch'+ci).getContext('2d');
  CH[ci]=new Chart(ctx,{type:'line',data:{labels:WL,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{position:'top',labels:{boxWidth:9,font:{size:8},usePointStyle:true,
        filter:function(item){return true;}}},
      tooltip:{callbacks:{label:function(c){
        return ' '+c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y.toLocaleString():'--');
      }}}
    },
    scales:{
      x:{grid:{display:false},ticks:{font:{size:7},maxRotation:0,maxTicksLimit:27}},
      y:{grid:{color:function(c){return(net&&c.tick.value===0)?'#1a3a5c':'#f0f0f0';},
              lineWidth:function(c){return(net&&c.tick.value===0)?2:1;}},
         ticks:{font:{size:8},callback:function(v){return v!=null?v.toLocaleString():'';}}
        }
    }
  }});
}

function makeCard(ci){
  var crop=Math.floor(ci/3),type=ci%3;
  var div=document.createElement('div');div.className='card';
  div.innerHTML='<div class="ct">'+TITLES[type]+'</div>'
    +'<div class="cr no-print"><div><div class="cl">Years <span class="tog" onclick="togAllY('+ci+')">all/none</span></div>'
    +'<div class="chips" id="y'+ci+'"></div></div>'
    +'<div><div class="cl">Months <span class="tog" onclick="togM('+ci+')">all/none</span></div>'
    +'<div class="chips" id="m'+ci+'"></div></div></div>'
    +'<div class="cb"><canvas id="ch'+ci+'"></canvas></div>';
  document.getElementById(GRIDS[crop]).appendChild(div);
}

function makeYChips(ci){
  var el=document.getElementById('y'+ci);el.innerHTML='';
  for(var i=0;i<ALL_YEARS.length;i++){
    (function(y){
      var isOn=ST[ci].years.indexOf(y)>=0;
      var c=document.createElement('span');
      c.className='chip'+(isOn?' on':'');
      c.textContent=y;
      if(isOn){c.style.background=yCol(y);c.style.color='#fff';c.style.borderColor=yCol(y);}
      c.dataset.on=isOn?'1':'0';
      c.onclick=function(){
        if(c.dataset.on==='1'){
          var idx=ST[ci].years.indexOf(y);if(idx>-1)ST[ci].years.splice(idx,1);
          c.style.background='';c.style.color='';c.style.borderColor='';
          c.classList.remove('on');c.dataset.on='0';
        }else{
          ST[ci].years.push(y);
          c.style.background=yCol(y);c.style.color='#fff';c.style.borderColor=yCol(y);
          c.classList.add('on');c.dataset.on='1';
        }
        drawChart(ci);
      };
      el.appendChild(c);
    })(ALL_YEARS[i]);
  }
}

function makeMChips(ci){
  var el=document.getElementById('m'+ci);el.innerHTML='';
  for(var i=0;i<CM.length;i++){
    (function(m){
      var c=document.createElement('span');c.className='chip on';
      c.textContent=MN[m-1];
      c.onclick=function(){
        var idx=ST[ci].months.indexOf(m);
        if(idx>-1){ST[ci].months.splice(idx,1);c.classList.remove('on');}
        else{ST[ci].months.push(m);c.classList.add('on');}
        drawChart(ci);
      };
      el.appendChild(c);
    })(CM[i]);
  }
}

function togM(ci){
  var all=ST[ci].months.length===CM.length;
  ST[ci].months=all?[]:CM.slice();
  document.getElementById('m'+ci).querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on',!all);});
  drawChart(ci);
}

function togAllY(ci){
  var all=ST[ci].years.length===ALL_YEARS.length;
  ST[ci].years=all?[]:ALL_YEARS.slice();
  makeYChips(ci); drawChart(ci);
}

function renderCW(rows){
  var dateMap={};
  for(var i=0;i<rows.length;i++){
    var d=rows[i]['Report Date'];
    if(d){
      var parts=d.split('/');
      if(parts.length===3){
        var t=new Date(parseInt(parts[2]),parseInt(parts[0])-1,parseInt(parts[1])).getTime();
        if(!dateMap[t]) dateMap[t]=d;
      }
    }
  }
  var times=Object.keys(dateMap).map(Number).sort(function(a,b){return a-b;});
  if(!times.length) return;
  var latest=dateMap[times[times.length-1]];
  var wr=rows.filter(function(r){return r['Report Date']===latest;});
  var rn=wr[0]?wr[0]['Report #']:'';
  var wn=wr[0]?Math.round(parseFloat(wr[0]['Week #'])):'';
  document.getElementById('cw-meta').textContent='Report #'+rn+'  Week '+wn+'  Data as of '+latest+'  In Contracts';

  function fmt(n){if(n===''||n==null)return '--';var v=Number(n);if(isNaN(v))return n;return v<0?'('+Math.abs(v).toLocaleString()+')':v.toLocaleString();}
  function cc(n){var v=Number(n);return v>0?'pos':v<0?'neg':'';}

  var sorted=wr.slice().sort(function(a,b){
    if(a['Old/New']==='total') return 1;if(b['Old/New']==='total') return -1;
    var ay=parseFloat(a['Yr'])||0,by=parseFloat(b['Yr'])||0;
    if(ay!==by) return ay-by;
    return (parseFloat(a['Month'])||0)-(parseFloat(b['Month'])||0);
  });
  var tb=document.getElementById('cw-body');tb.innerHTML='';
  for(var i=0;i<sorted.length;i++){
    var r=sorted[i];
    var tr=document.createElement('tr');tr.className=r['Old/New']||'';
    tr.innerHTML='<td>'+(r['Futures Based On']||'--')+'</td>'
      +'<td>'+fmt(r['Unfixed Call Sales'])+'</td><td class="'+cc(r['Chg Sales'])+'">'+fmt(r['Chg Sales'])+'</td>'
      +'<td>'+fmt(r['Unfixed Call Purchases'])+'</td><td class="'+cc(r['Chg Purchases'])+'">'+fmt(r['Chg Purchases'])+'</td>'
      +'<td>'+fmt(r['At Close'])+'</td><td class="'+cc(r['Chg At Close'])+'">'+fmt(r['Chg At Close'])+'</td>';
    tb.appendChild(tr);
  }
}

function showErr(msg){
  document.getElementById('err').style.display='block';
  document.getElementById('err').textContent=msg;
  document.getElementById('badge').textContent='Error';
  document.getElementById('badge').className='err';
}

function boot(){
  var lmsg=document.getElementById('lmsg');
  var url='./data/cotton_oncall.csv?t='+Date.now();
  lmsg.textContent='Fetching CSV...';
  fetch(url).then(function(res){
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(function(text){
    lmsg.textContent='Parsing...';
    var rows=parseCSV(text);
    if(!rows.length) throw new Error('No data rows found');
    ALL_DATA=rows;
    buildData(rows);
    ALL_YEARS=Object.keys(DATA).sort();
    var maxW=0;
    for(var y in DATA) for(var w in DATA[y]){var n=parseInt(w);if(n>maxW)maxW=n;}
    WL=[]; for(var i=1;i<=maxW;i++) WL.push('W'+i);

    // Default: last 5 years, skip 2004 & 2005
    var curY=new Date().getFullYear();
    var defYears=ALL_YEARS.filter(function(y){
      var yi=parseInt(y);
      return yi>=curY-4 && yi<=curY && yi>2005;
    });
    for(var ci=0;ci<9;ci++) ST[ci].years=defYears.slice();

    renderCW(rows);
    for(var ci=0;ci<9;ci++){makeCard(ci);makeYChips(ci);makeMChips(ci);drawChart(ci);}

    var allDates=[];
    for(var i=0;i<rows.length;i++){if(rows[i]['Report Date']) allDates.push(rows[i]['Report Date']);}
    allDates.sort(function(a,b){
      var pa=a.split('/'),pb=b.split('/');
      return new Date(parseInt(pa[2]),parseInt(pa[0])-1,parseInt(pa[1]))
           - new Date(parseInt(pb[2]),parseInt(pb[0])-1,parseInt(pb[1]));
    });
    document.getElementById('badge').textContent='Last report: '+(allDates[allDates.length-1]||'--');
    document.getElementById('badge').className='ok';
  }).catch(function(e){
    showErr('Could not load data: '+e.message);
  }).finally(function(){
    document.getElementById('loading').style.display='none';
  });
}
boot();
</script>
</body>
</html>
